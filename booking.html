<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - The Uniqost 21</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .page-wrap {
      min-height: 100vh;
      background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 50%, #FDF2F8 100%);
      padding: 40px 32px;
    }
    .page-card {
      background: white; border-radius: 24px;
      padding: 40px; width: 100%; max-width: 520px;
      margin: 0 auto;
      box-shadow: 0 8px 40px rgba(236,72,153,0.12);
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #EC4899; text-decoration: none;
      font-size: 14px; font-weight: 500; margin-bottom: 24px;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 600;
      color: #1F2937; margin-bottom: 6px;
    }
    .page-sub { font-size: 14px; color: #6B7280; margin-bottom: 28px; }

    .room-info {
      background: #FDF2F8; border: 1px solid #FCE7F3;
      border-radius: 16px; padding: 16px 20px;
      margin-bottom: 24px;
    }
    .room-info-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 600; color: #1F2937;
    }
    .room-info-price {
      font-size: 16px; font-weight: 600;
      color: #EC4899; margin-top: 4px;
    }

    .type-selector {
      display: flex; gap: 12px; margin-bottom: 24px;
    }
    .type-btn {
      flex: 1; padding: 14px;
      border-radius: 12px; border: 2px solid #FCE7F3;
      background: white; cursor: pointer;
      text-align: center; transition: all .2s;
    }
    .type-btn.active {
      border-color: #EC4899;
      background: #FDF2F8;
    }
    .type-btn-icon { font-size: 24px; margin-bottom: 6px; }
    .type-btn-title {
      font-size: 14px; font-weight: 600; color: #1F2937;
    }
    .type-btn-desc { font-size: 11px; color: #6B7280; margin-top: 2px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px;
      font-weight: 500; color: #1F2937; margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #FCE7F3; border-radius: 12px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      color: #1F2937; outline: none; transition: all .2s; resize: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #EC4899;
      box-shadow: 0 0 0 3px rgba(236,72,153,0.1);
    }
    .btn-submit {
      width: 100%; padding: 14px;
      background: #EC4899; color: white;
      border: none; border-radius: 99px;
      font-size: 15px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all .2s; margin-top: 8px;
    }
    .btn-submit:hover { background: #DB2777; }
    .error-msg {
      background: #FEE2E2; color: #991B1B;
      padding: 10px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .success-msg {
      background: #D1FAE5; color: #065F46;
      padding: 10px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-card">

      <a href="index.html" class="back-btn">← Kembali</a>

      <div class="page-title">Form Pemesanan 🌸</div>
      <div class="page-sub">Lengkapi form di bawah untuk melanjutkan</div>

      <div class="room-info">
        <div class="room-info-name" id="room-name">Memuat data kamar...</div>
        <div class="room-info-price" id="room-price"></div>
      </div>

      <!-- Pilihan tipe -->
      <div class="type-selector">
        <div class="type-btn active" id="btn-booking" onclick="pilihTipe('booking')">
          <div class="type-btn-icon">📅</div>
          <div class="type-btn-title">Booking</div>
          <div class="type-btn-desc">Bayar nanti / survey dulu</div>
        </div>
        <div class="type-btn" id="btn-pesan" onclick="pilihTipe('pesan')">
          <div class="type-btn-icon">💳</div>
          <div class="type-btn-title">Pesan Sekarang</div>
          <div class="type-btn-desc">Bayar langsung</div>
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <div class="form-group">
        <label>Tanggal Rencana Masuk</label>
        <input type="date" id="check_in_date">
      </div>
      <div class="form-group">
        <label>Catatan (opsional)</label>
        <textarea id="notes" rows="3"
          placeholder="Contoh: saya ingin survey dulu sebelum memutuskan"></textarea>
      </div>

      <button class="btn-submit" onclick="kirimBooking()">
        Kirim Pemesanan
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    // Ambil parameter dari URL
    const params = new URLSearchParams(window.location.search)
    const roomId = params.get('id')
    let tipeSelected = params.get('type') || 'booking'

    // Set tipe awal
    pilihTipe(tipeSelected)

    function pilihTipe(tipe) {
      tipeSelected = tipe
      document.getElementById('btn-booking').classList.toggle('active', tipe === 'booking')
      document.getElementById('btn-pesan').classList.toggle('active', tipe === 'pesan')
    }

    // Set tanggal minimum hari ini
    const today = new Date().toISOString().split('T')[0]
    document.getElementById('check_in_date').min = today

    // Ambil data kamar
    async function loadKamar() {
      if (!roomId) return
      const { data } = await db.from('rooms').select('*').eq('id', roomId).single()
      if (data) {
        document.getElementById('room-name').textContent = data.name
        document.getElementById('room-price').textContent =
          'Rp ' + data.price.toLocaleString('id-ID') + '/bulan'
      }
    }

    async function kirimBooking() {
      const check_in_date = document.getElementById('check_in_date').value
      const notes = document.getElementById('notes').value
      const errorMsg = document.getElementById('error-msg')
      const successMsg = document.getElementById('success-msg')

      errorMsg.style.display = 'none'
      successMsg.style.display = 'none'

      if (!check_in_date) {
        errorMsg.style.display = 'block'
        errorMsg.textContent = 'Tanggal masuk wajib diisi!'
        return
      }

      // Cek login
      const { data: { user } } = await db.auth.getUser()
      if (!user) {
        window.location.href = 'login.html'
        return
      }

      // Cek data diri
      const { data: profile } = await db
        .from('profiles').select('*').eq('id', user.id).single()
      if (!profile || !profile.full_name) {
        window.location.href = 'profile.html'
        return
      }

      // Simpan booking
      const { data: booking, error } = await db.from('bookings').insert({
        user_id: user.id,
        room_id: roomId,
        type: tipeSelected,
        check_in_date,
        notes,
        status: 'pending'
      }).select().single()

      if (error) {
        errorMsg.style.display = 'block'
        errorMsg.textContent = 'Gagal mengirim pemesanan: ' + error.message
        return
      }

      // Update status kamar
      await db.from('rooms').update({
        status: tipeSelected === 'pesan' ? 'dipesan' : 'booking'
      }).eq('id', roomId)

      successMsg.style.display = 'block'

      if (tipeSelected === 'pesan') {
        successMsg.textContent = 'Pemesanan berhasil! Mengalihkan ke halaman pembayaran...'
        setTimeout(() => {
          window.location.href = 'payment.html?booking_id=' + booking.id
        }, 1500)
      } else {
        successMsg.textContent = 'Booking berhasil! Kami akan menghubungi kamu via WhatsApp segera.'
        setTimeout(() => {
          window.location.href = 'index.html'
        }, 2500)
      }
    }

    loadKamar()
  </script>
</body>
</html>
