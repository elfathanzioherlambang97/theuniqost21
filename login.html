<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - The Uniqost 21</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrap {
      min-height: 100vh;
      background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 50%, #FDF2F8 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
    }
    .auth-card {
      background: white; border-radius: 24px;
      padding: 40px; width: 100%; max-width: 420px;
      box-shadow: 0 8px 40px rgba(236,72,153,0.12);
    }
    .auth-logo {
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
      margin-bottom: 28px;
    }
    .auth-logo img { height: 60px; width: auto; }
    .auth-logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 600; color: #EC4899;
    }
    .auth-logo-tagline { font-size: 10px; color: #6B7280; }
    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 600;
      color: #1F2937; text-align: center; margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 14px; color: #6B7280;
      text-align: center; margin-bottom: 32px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px;
      font-weight: 500; color: #1F2937; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #FCE7F3; border-radius: 12px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      color: #1F2937; outline: none; transition: all .2s;
    }
    .form-group input:focus { border-color: #EC4899; box-shadow: 0 0 0 3px rgba(236,72,153,0.1); }
    .btn-submit {
      width: 100%; padding: 14px;
      background: #EC4899; color: white;
      border: none; border-radius: 99px;
      font-size: 15px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all .2s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: #DB2777; }
    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: 14px; color: #6B7280;
    }
    .auth-footer a { color: #EC4899; text-decoration: none; font-weight: 500; }
    .error-msg {
      background: #FEE2E2; color: #991B1B;
      padding: 10px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="/theuniqost21/Assets/logo.png" alt="The Uniqost 21">
        <div>
          <div class="auth-logo-name">The Uniqost 21</div>
          <div class="auth-logo-tagline">- Enjoy Your Stay With Unique -</div>
        </div>
      </div>

      <div class="auth-title">Selamat Datang 🌸</div>
      <div class="auth-sub">Masuk ke akun kamu untuk melanjutkan</div>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="contoh@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password">
      </div>

      <button class="btn-submit" onclick="login()">Masuk</button>

      <div class="auth-footer">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorMsg = document.getElementById('error-msg')

      if (!email || !password) {
        errorMsg.style.display = 'block'
        errorMsg.textContent = 'Email dan password wajib diisi!'
        return
      }

      const { data, error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        errorMsg.style.display = 'block'
        errorMsg.textContent = 'Email atau password salah!'
        return
      }

      // Cek apakah sudah isi data diri
      const { data: profile } = await db
        .from('profiles')
        .select('*')
        .eq('id', data.user.id)
        .single()

      if (!profile || !profile.full_name) {
        window.location.href = 'profile.html'
      } else {
        window.location.href = 'index.html'
      }
    }
  </script>
</body>
</html>
